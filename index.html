<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- 機能していないかもしれない拡大禁止 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>雀魂ガチャ確率計算機</title>

<style>
:root {
  --card-width: min(92vw, 380px);
  --font-main: clamp(14px, 2.5vw, 18px);
  --font-big: clamp(20px, 5vw, 28px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;

  /* ダブルタップ防止だが機能してない*/
  touch-action: manipulation;
}

.card {
  background: #1e293b;
  padding: clamp(14px, 3vw, 22px);
  border-radius: 16px;
  width: var(--card-width);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-size: clamp(14px, 3vw, 18px);
  margin-bottom: 10px;
  text-align: center;
}

.display {
  background: #0b1220;
  padding: clamp(8px, 2vw, 12px);
  border-radius: 10px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  border: 2px solid transparent;
  font-size: var(--font-main);
}

.display.active {
  border-color: #38bdf8;
}

.pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(5px, 1.5vw, 8px);
  margin-top: 8px;
}

button {
  padding: clamp(10px, 2.5vw, 14px);
  font-size: clamp(14px, 3vw, 18px);
  border: none;
  border-radius: 10px;
  background: #334155;
  color: white;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

.control {
  background: #38bdf8;
  color: #0b1220;
  font-weight: bold;
}

.controls {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.result {
  margin-top: 10px;
  padding: 10px;
  background: #0b1220;
  border-radius: 10px;
  text-align: center;
}

.big {
  font-size: var(--font-big);
  color: #38bdf8;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h1>雀魂ガチャ確率計算機</h1>

<div id="d10" class="display active">10連：<span id="v10">0</span></div>
<div id="d1" class="display">単発：<span id="v1">0</span></div>
<div id="dk" class="display">目標人数：<span id="vk">1</span></div>

<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearInput()">C</button>
<button onclick="press(0)">0</button>
<button onclick="back()">←</button>
</div>

<div class="controls">
<button class="control" onclick="switchTarget()">入力切替</button>
<button class="control" onclick="switchMode()">モード切替</button>
</div>

<button class="control" style="width:100%; margin-top:6px;" onclick="calc()">計算</button>

<div class="result">
<div id="label">1人以上引く確率</div>
<div id="output" class="big">-</div>
</div>

</div>

<script>
// ダブルタップズーム防止的なもの
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

let target="ten";
let ten="0", one="0", k="1";
let mode="get";

function updateLabel(){
  const kk = Number(k);
  label.innerText = (mode==="get")
    ? kk + "人以上引く確率"
    : kk + "人以上引けない確率";
}

function update(){
  v10.innerText=ten;
  v1.innerText=one;
  vk.innerText=k;

  d10.classList.toggle("active",target==="ten");
  d1.classList.toggle("active",target==="one");
  dk.classList.toggle("active",target==="k");

  updateLabel();
}

function press(n){
  if(target==="ten") ten=(ten==="0")?""+n:ten+n;
  if(target==="one") one=(one==="0")?""+n:one+n;
  if(target==="k") k=(k==="0")?""+n:k+n;
  update();
}

function clearInput(){
  if(target==="ten") ten="0";
  if(target==="one") one="0";
  if(target==="k") k="0";
  update();
}

function back(){
  if(target==="ten") ten=ten.length>1?ten.slice(0,-1):"0";
  if(target==="one") one=one.length>1?one.slice(0,-1):"0";
  if(target==="k") k=k.length>1?k.slice(0,-1):"0";
  update();
}

function switchTarget(){
  target = target==="ten"?"one":target==="one"?"k":"ten";
  update();
}

function switchMode(){
  mode = mode==="get"?"fail":"get";
  update();
}

function comb(n,r){
  if(r>n) return 0;
  let res=1;
  for(let i=1;i<=r;i++){
    res*= (n - i + 1)/i;
  }
  return res;
}

function binom(n,k,p){
  return comb(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k);
}

function calc(){
  const x=Number(ten);
  const z=Number(one);
  const kk=Number(k);

  const n = 9*x + z;
  const p = 0.05;

  let sum=0;

  if(mode==="get"){
    for(let i=kk;i<=n;i++) sum+=binom(n,i,p);
  }else{
    for(let i=0;i<kk;i++) sum+=binom(n,i,p);
  }

  output.innerText=(sum*100).toFixed(6)+"%";
}

update();
</script>

</body>
</html>
